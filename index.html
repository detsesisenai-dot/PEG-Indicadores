        // --- CONJUNTO DE DADOS EXPANDIDO ---

          // 6. % de Conclusão nos cursos FIC presencial
          { DR: 'BA', Meta: 85, Realizado: 86, Indicador: '% de Conclusão nos cursos FIC presencial' },
          { DR: 'CE', Meta: 85, Realizado: 88, Indicador: '% de Conclusão nos cursos FIC presencial' },
          { DR: 'GO', Meta: 85, Realizado: 83, Indicador: '% de Conclusão nos cursos FIC presencial' },

          // 7. % de Conclusão nos cursos FIC semipresencial/EAD
          { DR: 'BA', Meta: 75, Realizado: 76, Indicador: '% de Conclusão nos cursos FIC semipresencial/EAD' },
          { DR: 'CE', Meta: 75, Realizado: 78, Indicador: '% de Conclusão nos cursos FIC semipresencial/EAD' },
          { DR: 'GO', Meta: 75, Realizado: 72, Indicador: '% de Conclusão nos cursos FIC semipresencial/EAD' },

          // 8. % de Conclusão nos cursos TEC semipresencial/EAD

          { DR: 'BRASIL', Meta: 70, Realizado: 67, Indicador: '% de Conclusão nos cursos TEC semipresencial/EAD' },

          // 9. Aumento da produtividade nas empresas atendidas por programas de produtividade industrial
          { DR: 'BA', Meta: 0.20, Realizado: 0.31, Indicador: 'Aumento da produtividade nas empresas atendidas por programas de produtividade industrial' },
          { DR: 'CE', Meta: 0.20, Realizado: 0.28, Indicador: 'Aumento da produtividade nas empresas atendidas por programas de produtividade industrial' },
          { DR: 'GO', Meta: 0.20, Realizado: 0.48, Indicador: 'Aumento da produtividade nas empresas atendidas por programas de produtividade industrial' },
          { DR: 'MG', Meta: 0.20, Realizado: 0.35, Indicador: 'Aumento da produtividade nas empresas atendidas por programas de produtividade industrial' },
          { DR: 'PR', Meta: 0.20, Realizado: 0.53, Indicador: 'Aumento da produtividade nas empresas atendidas por programas de produtividade industrial' },
          { DR: 'SP', Meta: 0.20, Realizado: 0.41, Indicador: 'Aumento da produtividade nas empresas atendidas por programas de produtividade industrial' },
          { DR: 'BRASIL', Meta: 0.20, Realizado: 0.38, Indicador: 'Aumento da produtividade nas empresas atendidas por programas de produtividade industrial' },

          // 10. % de receita de tecnologia e inovação sobre a receita de contribuição compulsória
          { DR: 'BA', Meta: 15, Realizado: 12, Indicador: '% de receita de tecnologia e inovação sobre a receita de contribuição compulsória' },
          { DR: 'CE', Meta: 15, Realizado: 14, Indicador: '% de receita de tecnologia e inovação sobre a receita de contribuição compulsória' },
          { DR: 'GO', Meta: 15, Realizado: 16, Indicador: '% de receita de tecnologia e inovação sobre a receita de contribuição compulsória' },
          { DR: 'MG', Meta: 15, Realizado: 13, Indicador: '% de receita de tecnologia e inovação sobre a receita de contribuição compulsória' },
          { DR: 'PR', Meta: 15, Realizado: 18, Indicador: '% de receita de tecnologia e inovação sobre a receita de contribuição compulsória' },
          { DR: 'SP', Meta: 15, Realizado: 17, Indicador: '% de receita de tecnologia e inovação sobre a receita de contribuição compulsória' },
          { DR: 'BRASIL', Meta: 15, Realizado: 14, Indicador: '% de receita de tecnologia e inovação sobre a receita de contribuição compulsória' },
        ];

        const indicatorRules = {
          'Custo hora-aluno FIC+TEC presencial': { isHigherBetter: false, format: 'currency' },
          'Custo hora-aluno FIC+TEC semipresencial/EAD': { isHigherBetter: false, format: 'currency' },
          '% de Recursos destinados às atividades-fim': { isHigherBetter: true, format: 'percent' },
          'Impacto da folha de pessoal no orçamento': { isHigherBetter: false, format: 'percent' },
          'Sustentabilidade Operacional em Tecnologia e Inovação': { isHigherBetter: true, format: 'percent' },
          '% de Conclusão nos cursos FIC presencial': { isHigherBetter: true, format: 'percent' },
          '% de Conclusão nos cursos FIC semipresencial/EAD': { isHigherBetter: true, format: 'percent' },
          '% de Conclusão nos cursos TEC semipresencial/EAD': { isHigherBetter: true, format: 'percent' },
          'Aumento da produtividade nas empresas atendidas por programas de produtividade industrial': { isHigherBetter: true, format: 'percent_decimal' },
          '% de receita de tecnologia e inovação sobre a receita de contribuição compulsória': { isHigherBetter: true, format: 'percent' }
        };

        const allIndicators = Object.keys(indicatorRules);

        const colors = {
          bg: '#FFFFFF',
          text: '#1F2937', 
          cardBg: '#374151', 
          cyan: '#06B6D4', 
          success: '#10B981',
          warning: '#EF4444'
        };

        // Formatação robusta de números
        const formatValue = (val, formatType) => {
          if (val === undefined || val === null || isNaN(val)) return '-';
          const numVal = Number(val);
          if (formatType === 'currency') return `R$ ${numVal.toFixed(2).replace('.', ',')}`;
          if (formatType === 'percent_decimal') return `${(numVal * 100).toFixed(1).replace('.', ',')}%`;
          if (formatType === 'percent') return `${numVal.toFixed(0)}%`;
          return numVal;
        };

        function App() {
          const [filterCategory, setFilterCategory] = useState('Todos');
          const [selectedIndicator, setSelectedIndicator] = useState(allIndicators[0]);

          const indicatorStatusMap = useMemo(() => {
            const statusMap = {};
            allIndicators.forEach(ind => {
              const rule = indicatorRules[ind];
              const goData = rawData.find(d => d.Indicador === ind && d.DR === 'GO');
              if (!goData) {
                statusMap[ind] = 'Sem Dados';
              } else {
                const achieved = rule.isHigherBetter ? goData.Realizado >= goData.Meta : goData.Realizado <= goData.Meta;
                statusMap[ind] = achieved ? 'Destaques' : 'Atenção';
              }
            });
            return statusMap;
          }, []);

          const filteredIndicatorsList = useMemo(() => {
            if (filterCategory === 'Todos') return allIndicators;
            return allIndicators.filter(ind => indicatorStatusMap[ind] === filterCategory);
          }, [filterCategory, indicatorStatusMap]);

          useEffect(() => {
            if (filteredIndicatorsList.length > 0 && !filteredIndicatorsList.includes(selectedIndicator)) {
              setSelectedIndicator(filteredIndicatorsList[0]);
            }
          }, [filteredIndicatorsList, selectedIndicator]);

          const processedData = useMemo(() => {
            let filtered = rawData.filter(d => d.Indicador === selectedIndicator && d.DR !== 'BRASIL');
            const brasilData = rawData.find(d => d.Indicador === selectedIndicator && d.DR === 'BRASIL');
            const rule = indicatorRules[selectedIndicator] || { isHigherBetter: true, format: 'percent' };

            filtered.sort((a, b) => rule.isHigherBetter ? b.Realizado - a.Realizado : a.Realizado - b.Realizado);
            return { ranking: filtered, brasil: brasilData, rule };
          }, [selectedIndicator]);

          const { ranking, brasil, rule } = processedData;
          const goiasData = ranking.find(d => d.DR === 'GO');
          
          const targetAchieved = goiasData 
            ? (rule.isHigherBetter ? goiasData.Realizado >= goiasData.Meta : goiasData.Realizado <= goiasData.Meta)
            : false;

          const goiasRank = ranking.findIndex(d => d.DR === 'GO') + 1;

          const generateInsights = () => {
            if (!goiasData) return { points: [], attention: [] };

            const diffToMeta = Math.abs(goiasData.Realizado - goiasData.Meta);
            const pctDiffToMeta = goiasData.Meta !== 0 ? (diffToMeta / goiasData.Meta) * 100 : 0;
            
            let points = [];
            let attention = [];

            if (targetAchieved) {
              points.push(`Goiás cumpriu a meta estipulada (${formatValue(goiasData.Meta, rule.format)}), registando ${formatValue(goiasData.Realizado, rule.format)}.`);
              if (pctDiffToMeta > 10) {
                points.push(rule.isHigherBetter 
                  ? `Desempenho de excelência, superando a meta em mais de ${pctDiffToMeta.toFixed(0)}%.`
                  : `Otimização de alta eficiência, com resultado ${pctDiffToMeta.toFixed(0)}% melhor que o teto da meta.`);
              }
            } else {
              attention.push(`O resultado atual de ${formatValue(goiasData.Realizado, rule.format)} está fora da meta ideal de ${formatValue(goiasData.Meta, rule.format)}.`);
              attention.push(`Recomenda-se revisão estratégica focada em ${rule.isHigherBetter ? 'alavancar processos produtivos' : 'contenção de custos e eficiência operacional'}.`);
            }

            const topTertile = Math.ceil(ranking.length / 3);
            if (goiasRank <= topTertile && goiasRank > 0) {
              points.push(`O DR Goiás é destaque nacional, ocupando a ${goiasRank}ª posição entre os estados analisados, refletindo alta competitividade.`);
            } else if (goiasRank > ranking.length - topTertile) {
              attention.push(`No ranking nacional, o estado está no terço inferior (${goiasRank}º lugar), indicando oportunidade de benchmarking com outros DRs.`);
            } else if (goiasRank > 0) {
              points.push(`O estado mantém uma posição intermediária (${goiasRank}º lugar) no cenário nacional, apresentando estabilidade.`);
            }

            if (brasil) {
              const betterThanBr = rule.isHigherBetter ? goiasData.Realizado > brasil.Realizado : goiasData.Realizado < brasil.Realizado;
              if (betterThanBr) {
                points.push(`A performance estadual supera a média nacional do sistema SENAI (${formatValue(brasil.Realizado, rule.format)}).`);
              } else {
                attention.push(`Indicador performando de forma menos eficiente do que a média consolidada do Brasil (${formatValue(brasil.Realizado, rule.format)}).`);
              }
            }

            return { points, attention };
          };

          const insights = generateInsights();

          const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
              const data = payload[0].payload;
              return (
                <div className="bg-gray-800 text-white p-4 rounded-lg shadow-xl border border-gray-700">
                  <p className="font-bold text-cyan-500 mb-2">{label === 'GO' ? '📍 DR GOIÁS' : `DR ${label}`}</p>
                  <p className="text-sm">Realizado: <span className="font-bold">{formatValue(data.Realizado, rule.format)}</span></p>
                  <p className="text-sm text-gray-400">Meta: {formatValue(data.Meta, rule.format)}</p>
                </div>
              );
            }
            return null;
          };

          return (
            <div className="min-h-screen bg-white text-gray-800 p-4 md:p-8 w-full">
              {/* CABEÇALHO E FILTROS */}
              <header className="mb-8 flex flex-col xl:flex-row justify-between items-start xl:items-center border-b-2 border-gray-200 pb-6 gap-6">
                <div>
                  <h1 className="text-3xl md:text-4xl font-black tracking-tight text-gray-800">
                    Painel Estratégico <span className="text-cyan-500">PEG</span>
                  </h1>
                  <p className="text-gray-500 font-medium mt-1 uppercase tracking-widest text-sm">
                    Monitorização DR Goiás • Jan a Mai 2026
                  </p>
                </div>
                
                <div className="flex flex-col gap-4 w-full xl:w-auto">
                  <div className="flex flex-wrap gap-2 items-center">
                    <span className="text-xs font-bold text-gray-500 uppercase flex items-center gap-1 mr-2">
                      <Filter size={14} /> Filtro de Desempenho:
                    </span>
                    {['Todos', 'Destaques', 'Atenção'].map(cat => (
                      <button
                        key={cat}
                        onClick={() => setFilterCategory(cat)}
                        className={`px-4 py-2 rounded-full text-xs font-bold uppercase transition-all ${
                          filterCategory === cat 
                            ? cat === 'Destaques' ? 'bg-emerald-500 text-white shadow-lg' 
                              : cat === 'Atenção' ? 'bg-red-500 text-white shadow-lg' 
                              : 'bg-cyan-500 text-white shadow-lg'
                            : 'bg-gray-200 text-gray-600 hover:bg-gray-300'
                        }`}
                      >
                        {cat}
                      </button>
                    ))}
                  </div>

                  {filteredIndicatorsList.length > 0 ? (
                    <select 
                      className="w-full xl:w-96 rounded-lg p-3 outline-none font-medium cursor-pointer shadow-lg transition-all text-sm bg-gray-800 text-white border-none"
                      value={selectedIndicator}
                      onChange={(e) => setSelectedIndicator(e.target.value)}
                    >
                      {filteredIndicatorsList.map(ind => (
                        <option key={ind} value={ind}>{ind}</option>
                      ))}
                    </select>
                  ) : (
                    <div className="w-full xl:w-96 bg-gray-100 text-gray-400 rounded-lg p-3 text-sm font-medium border border-gray-200">
                      Nenhum indicador encontrado para este filtro.
                    </div>
                  )}
                </div>
              </header>

              {goiasData ? (
                <>
                  {/* CARTÕES KPI */}
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div className="p-6 rounded-2xl shadow-lg relative overflow-hidden group bg-gray-800 border-l-4 border-cyan-500">
                      <div className="absolute top-0 right-0 p-4 opacity-20"><Target size={48} color="#06B6D4"/></div>
                      <p className="text-sm font-bold uppercase tracking-wider mb-1 text-gray-400">Resultado GO</p>
                      <h2 className="text-3xl font-black text-white">{formatValue(goiasData.Realizado, rule.format)}</h2>
                      <p className="text-sm mt-2 font-medium text-cyan-400">Meta: {formatValue(goiasData.Meta, rule.format)}</p>
                    </div>

                    <div className={`p-6 rounded-2xl shadow-lg relative overflow-hidden bg-gray-800 border-l-4 ${targetAchieved ? 'border-emerald-500' : 'border-red-500'}`}>
                      <div className="absolute top-0 right-0 p-4 opacity-20"><Award size={48} color={targetAchieved ? '#10B981' : '#EF4444'}/></div>
                      <p className="text-sm font-bold uppercase tracking-wider mb-1 text-gray-400">Estado da Meta</p>
                      <div className="flex items-center gap-2 mt-1">
                        {targetAchieved ? <CheckCircle color="#10B981" size={28}/> : <AlertCircle color="#EF4444" size={28}/>}
                        <h2 className={`text-2xl font-black ${targetAchieved ? 'text-emerald-400' : 'text-red-400'}`}>
                          {targetAchieved ? 'Destaque Alcançado' : 'Ponto de Atenção'}
                        </h2>
                      </div>
                      <p className="text-xs mt-2 text-gray-400">{rule.isHigherBetter ? 'Maior é melhor' : 'Menor é melhor'}</p>
                    </div>

                    <div className="p-6 rounded-2xl shadow-lg relative overflow-hidden bg-gray-800 border-l-4 border-gray-600">
                       <div className="absolute top-0 right-0 p-4 opacity-20"><TrendingUp size={48} color="#9CA3AF"/></div>
                      <p className="text-sm font-bold uppercase tracking-wider mb-1 text-gray-400">Ranking Nacional</p>
                      <div className="flex items-baseline gap-1">
                        <h2 className="text-3xl font-black text-white">{goiasRank > 0 ? `${goiasRank}º` : '-'}</h2>
                        <span className="font-medium text-gray-400">/ {ranking.length}</span>
                      </div>
                    </div>

                    <div className="p-6 rounded-2xl shadow-lg relative overflow-hidden bg-gray-800 border-l-4 border-gray-600">
                       <div className="absolute top-0 right-0 p-4 opacity-20"><Info size={48} color="#9CA3AF"/></div>
                      <p className="text-sm font-bold uppercase tracking-wider mb-1 text-gray-400">Média Brasil</p>
                      <h2 className="text-3xl font-black text-white">{brasil ? formatValue(brasil.Realizado, rule.format) : '-'}</h2>
                    </div>
                  </div>

                  {/* GRELHA DE CONTEÚDO PRINCIPAL */}
                  <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                    
                    {/* SECÇÃO DO GRÁFICO */}
                    <div className="bg-gray-50 rounded-3xl p-6 border border-gray-200 shadow-inner xl:col-span-2">
                      <h3 className="text-xl font-bold mb-6 flex items-center gap-2 text-gray-800">
                        <span className="text-cyan-500"><TrendingUp size={24} /></span> 
                        Ranking de Desempenho por Estado
                      </h3>
                      
                      <div style={{ width: '100%', height: '400px' }}>
                        <ResponsiveContainer width="100%" height="100%">
                          <BarChart data={ranking} margin={{ top: 20, right: 30, left: 20, bottom: 5 }}>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E5E7EB" />
                            <XAxis 
                              dataKey="DR" 
                              axisLine={false} 
                              tickLine={false} 
                              tick={{ fill: '#4B5563', fontWeight: 'bold' }} 
                            />
                            <YAxis hide domain={[0, 'dataMax + (dataMax * 0.1)']} />
                            <Tooltip content={<CustomTooltip />} cursor={{ fill: '#F3F4F6' }} />
                            
                            <ReferenceLine 
                              y={goiasData.Meta} 
                              stroke="#4B5563" 
                              strokeDasharray="5 5" 
                              label={{ position: 'top', value: `Meta: ${formatValue(goiasData.Meta, rule.format)}`, fill: '#4B5563', fontSize: 12, fontWeight: 'bold' }} 
                            />
                            
                            <Bar dataKey="Realizado" radius={[6, 6, 0, 0]} maxBarSize={50}>
                              {ranking.map((entry, index) => (
                                <Cell 
                                  key={`cell-${index}`} 
                                  fill={entry.DR === 'GO' ? (targetAchieved ? colors.success : colors.warning) : colors.cardBg} 
                                />
                              ))}
                              <LabelList 
                                dataKey="Realizado" 
                                position="top" 
                                formatter={(val) => formatValue(val, rule.format).replace('R$', '').replace('%', '')}
                                style={{ fill: '#4B5563', fontSize: '11px', fontWeight: 'bold' }}
                              />
                            </Bar>
                          </BarChart>
                        </ResponsiveContainer>
                      </div>
                    </div>

                    {/* SECÇÃO DE INSIGHTS */}
                    <div className="flex flex-col gap-4">
                      <div className="rounded-3xl p-6 shadow-xl flex-1 flex flex-col bg-gray-800">
                        <h3 className="text-xl font-bold mb-6 flex items-center gap-2 pb-4 text-white border-b border-gray-700">
                          <span className="text-cyan-500"><TrendingUp size={24} /></span>
                          Insights Estratégicos DR-GO
                        </h3>
                        
                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                          {insights.points.length > 0 && (
                            <div className="mb-6">
                              <h4 className="font-bold uppercase text-xs tracking-widest mb-3 flex items-center gap-2 text-emerald-400">
                                <CheckCircle size={16} /> Pontos Positivos
                              </h4>
                              <ul className="flex flex-col gap-3">
                                {insights.points.map((point, i) => (
                                  <li key={i} className="text-sm leading-relaxed p-3 rounded-lg text-gray-300 bg-gray-700/50 border-l-4 border-emerald-500">
                                    {point}
                                  </li>
                                ))}
                              </ul>
                            </div>
                          )}

                          {insights.attention.length > 0 && (
                            <div>
                              <h4 className="font-bold uppercase text-xs tracking-widest mb-3 flex items-center gap-2 text-red-400">
                                <AlertCircle size={16} /> Pontos de Atenção
                              </h4>
                              <ul className="flex flex-col gap-3">
                                {insights.attention.map((att, i) => (
                                  <li key={i} className="text-sm leading-relaxed p-3 rounded-lg text-gray-300 bg-red-900/20 border-l-4 border-red-500">
                                    {att}
                                  </li>
                                ))}
                              </ul>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>

                  </div>
                </>
              ) : (
                <div className="flex items-center justify-center h-64 rounded-2xl mt-8 bg-gray-50 border-2 border-dashed border-gray-300">
                  <p className="font-medium text-gray-500">Selecione um filtro ou indicador válido acima.</p>
                </div>
              )}

              {/* RODAPÉ */}
              <footer className="mt-12 text-center text-xs font-medium pb-4 pt-6 text-gray-400 border-t border-gray-100">
                Relatório Gerencial • Baseado nas métricas PEG Janeiro a Maio de 2026 • Inteligência de Dados
              </footer>
            </div>
          );
        }

        // Renderização do React na div #root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

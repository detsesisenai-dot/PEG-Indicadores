        const indNames = [
          'Custo hora-aluno FIC+TEC presencial', 'Custo hora-aluno FIC+TEC semipresencial/EaD', '% de conclusão nos cursos FIC presencial', '% de conclusão nos cursos TEC presencial', '% de conclusão nos cursos FIC semipresencial e EaD', '% de conclusão nos cursos TEC semipresencial e EaD', 'Percentual de recursos destinados às atividades-fim', 'Impacto da folha de pessoal no orçamento', 'Sustentabilidade operacional em Serviços de Tecnologia e Inovação', '% da Receita de STI sobre a receita de contribuição compulsória', 'Aumento da produtividade nas empresas atendidas por programas de produtividade industrial'

        const dataMatrix = [
          [14.96, 19.17, 10.26, 14.04, 89.1, 90.0, 80.0, 17.9, 75.5, 84.8, 52.5, null, 85.9, 85.9, 48.1, 49.4, 71.0, 46.9, 7.2, 1.1, 20.0, 139.3], // AC
          [14.96, 19.92, 10.26, 13.82, 89.1, 90.7, 66.7, 0.0, 75.5, 99.5, 52.5, null, 85.9, 84.1, 61.0, 61.1, 62.0, 43.6, 6.8, 7.5, 20.0, 29.6], // AL
          [14.96, 18.25, 10.26, 12.78, 91.5, 87.6, 65.7, 62.1, 75.5, 88.8, 52.5, 95.3, 85.9, 81.4, 48.1, 46.7, 58.8, 74.1, 4.3, 2.8, 20.0, 40.5], // AM
          [14.96, 15.16, 10.26, 10.64, 89.1, 96.3, 65.7, 67.6, 85.4, 99.0, null, null, 85.9, 85.2, 48.1, 47.0, 71.0, 133.7, 6.8, 5.9, 20.0, 21.1], // AP
          [13.04, 13.29, 8.73, 8.10, 89.1, 67.9, 65.7, 33.9, 75.5, 54.5, 54.2, 30.8, 94.2, 95.1, 48.1, 51.4, 87.3, 82.5, 102.0, 90.6, 20.0, 37.7], // BA

          [14.96, 18.03, 10.26, 11.70, 89.1, 70.2, 65.7, 41.9, 75.5, 71.2, 52.5, 27.7, 85.9, 93.1, 48.1, 56.5, 71.0, 31.2, 10.9, 2.6, 20.0, 43.2], // DF
          [14.96, 14.90, 10.26, 12.07, 89.1, 87.0, 69.8, 72.7, 75.5, 96.8, 52.5, 0.0, 85.9, 87.2, 48.1, 49.1, 71.0, 64.9, 8.7, 2.7, 20.0, 53.9], // ES
          [10.06, 10.04, 4.07, 5.10, 91.0, 84.3, 65.7, 42.1, 75.5, 64.8, 52.5, 31.3, 89.4, 93.1, 39.1, 50.3, 71.0, 78.5, 13.1, 7.9, 20.0, 38.4], // GO
          [10.47, 12.16, 7.17, 9.88, 93.0, 95.5, 65.7, 62.3, 75.5, 87.4, 52.5, 35.8, 85.9, 89.4, 48.1, 51.5, 71.0, 74.4, 1.0, 2.9, 20.0, 33.7], // MA
          [11.64, 12.48, 10.26, 5.73, 89.1, 91.4, 65.7, 49.2, 75.5, 91.9, 52.5, 35.4, 87.4, 93.1, 47.5, 46.0, 100.7, 77.9, 17.8, 9.2, 20.0, 34.5], // MG
          [14.96, 12.79, 10.26, 9.24, 89.1, 83.9, 65.7, 34.2, 75.5, 95.6, 52.5, 20.2, 86.8, 88.3, 48.1, 66.3, 71.0, 57.2, 37.6, 11.9, 20.0, 39.5], // MS
          [14.96, 15.80, 10.26, 11.60, 89.1, 93.9, 65.7, 49.3, 75.5, 54.0, 52.5, null, 85.9, 88.0, 48.1, 56.9, 71.0, 76.2, 11.5, 5.2, 20.0, 33.6], // MT
          [13.55, 11.22, 9.17, 10.43, 89.1, 89.6, 65.7, 78.1, 75.5, 93.3, 52.5, null, 85.9, 85.3, 48.1, 59.0, 71.0, 14.5, 16.1, 0.8, 20.0, 41.2], // PA
          [14.96, 14.85, 10.26, 9.28, 89.1, 87.8, 65.7, 41.7, 75.5, 93.5, 52.5, 25.8, 85.9, 86.2, 48.1, 49.6, 71.0, 60.9, 14.3, 6.4, 20.0, 59.9], // PB
          [11.74, 14.09, 9.08, 11.16, 89.1, 92.1, 65.7, 35.0, 75.5, 74.5, 52.5, 28.6, 85.9, 92.4, 48.1, 46.4, 72.0, 146.1, 34.1, 18.2, 20.0, 34.9], // PE
          [14.96, 25.08, 10.26, 24.95, 89.1, 80.7, 65.7, 0.0, 75.5, 66.7, null, null, 85.9, 70.8, 48.1, 42.6, 58.8, 2.8, 6.8, 0.2, 20.0, 37.0], // PI
          [14.96, 15.41, 10.26, 8.80, 89.1, 78.3, 70.2, 26.8, 75.5, 64.5, 52.5, 25.0, 85.9, 93.1, 48.1, 44.8, 80.0, 113.3, 34.2, 15.6, 20.0, 53.6], // PR
          [14.96, 11.37, 11.36, 8.12, 89.1, 73.9, 65.7, 63.4, 83.3, 66.6, 52.5, 66.7, 85.9, 86.8, 52.7, 53.4, 69.0, 73.6, 12.0, 9.0, 20.0, 57.3], // RJ
          [12.48, 15.91, 8.49, 16.14, 89.1, 91.3, 65.7, 36.9, 75.5, 94.8, 52.5, 0.0, 85.9, 91.9, 48.1, 49.3, 81.4, 92.0, 50.0, 27.6, 20.0, 42.1], // RN
          [11.21, 7.41, 7.47, 5.56, 89.1, 93.2, 65.7, 16.7, 75.5, 98.9, 52.5, 35.5, 85.9, 90.0, 38.9, 38.5, 71.0, 40.6, 1.0, 1.8, 20.0, 37.4], // RO
          [14.96, 16.31, 10.26, 12.59, 89.1, 89.4, 65.7, null, 77.4, 95.9, 52.5, null, 85.9, 80.7, 48.1, 51.1, 58.8, 29.5, 1.0, 0.7, 20.0, 26.2], // RR
          [14.96, 14.85, 10.26, 10.80, 89.1, 93.4, 65.7, 61.5, 85.6, 97.7, 52.5, 52.0, 85.9, 91.8, 48.1, 61.0, 71.0, 75.0, 24.5, 11.0, 20.0, 46.3], // RS
          [14.96, 13.56, 10.26, 9.91, 89.9, 77.3, 65.7, 46.3, 85.1, 62.1, 52.5, 33.3, 85.9, 90.6, 51.7, 57.7, 71.2, 82.7, 46.4, 26.9, 20.0, 34.1], // SC
          [14.96, 12.16, 8.45, 12.09, 89.1, 77.8, 65.7, 60.0, 87.5, 100.0, 52.5, 38.9, 85.9, 89.7, 48.1, 48.0, 58.8, 52.2, 1.0, 0.5, 20.0, 61.4], // SE
          [22.24, 21.58, 11.59, 9.22, 89.1, 91.6, 72.5, 78.9, 75.5, 79.4, 52.6, 75.0, 93.3, 96.2, 74.0, 63.0, 37.4, 76.7, 6.9, 4.6, 20.0, 41.3], // SP
          [14.96, 15.12, 10.26, 10.41, 89.1, 87.5, 65.7, 51.3, 75.5, 79.7, 52.5, 50.0, 85.9, 87.9, 48.1, 50.5, 71.0, 77.6, 1.0, 0.7, 20.0, 25.2], // TO
          [14.96, 15.45, 10.26, 8.55, 89.1, 87.6, 65.7, 50.1, 75.5, 78.3, 52.5, 37.6, 85.9, 92.0, 48.1, 55.2, 71.0, 79.9, 18.8, 11.4, 20.0, 39.2], // BRASIL
        ];

        const rawData = [];
        drsList.forEach((dr, i) => {
          indNames.forEach((ind, j) => {
            rawData.push({
              DR: dr,
              Indicador: ind,
              Meta: dataMatrix[i][j*2],
              Realizado: dataMatrix[i][j*2 + 1]
            });
          });
        });

        const indicatorRules = {
          'Custo hora-aluno FIC+TEC presencial': { isHigherBetter: false, format: 'currency' },
          'Custo hora-aluno FIC+TEC semipresencial/EaD': { isHigherBetter: false, format: 'currency' },
          '% de conclusão nos cursos FIC presencial': { isHigherBetter: true, format: 'percent' },
          '% de conclusão nos cursos TEC presencial': { isHigherBetter: true, format: 'percent' },
          '% de conclusão nos cursos FIC semipresencial e EaD': { isHigherBetter: true, format: 'percent' },
          '% de conclusão nos cursos TEC semipresencial e EaD': { isHigherBetter: true, format: 'percent' },
          'Percentual de recursos destinados às atividades-fim': { isHigherBetter: true, format: 'percent' },
          'Impacto da folha de pessoal no orçamento': { isHigherBetter: false, format: 'percent' },
          'Sustentabilidade operacional em Serviços de Tecnologia e Inovação': { isHigherBetter: true, format: 'percent' },
          '% da Receita de STI sobre a receita de contribuição compulsória': { isHigherBetter: true, format: 'percent' },
          'Aumento da produtividade nas empresas atendidas por programas de produtividade industrial': { isHigherBetter: true, format: 'percent' }
        };

        const allIndicators = Object.keys(indicatorRules);

        // =========================================================================
        // DADOS ESTRUTURAIS DE GRATUIDADE
        // =========================================================================
        const gratuidadeRawMatrix = {
          'AC': [12500000, 600000, 350000], 'AL': [18000000, 900000, 450000], 'AM': [35000000, 1500000, 800000],
          'AP': [8000000, 400000, 200000], 'BA': [110000000, 5000000, 3000000], 'CE': [75000000, 3500000, 2000000],
          'DF': [45000000, 2000000, 1200000], 'ES': [65000000, 3000000, 1800000], 'GO': [82000000, 4200000, 2800000],
          'MA': [40000000, 1800000, 1000000], 'MG': [250000000, 12000000, 8000000], 'MS': [38000000, 1700000, 1100000],
          'MT': [48000000, 2200000, 1400000], 'PA': [60000000, 2800000, 1600000], 'PB': [30000000, 1400000, 800000],
          'PE': [85000000, 4000000, 2500000], 'PI': [25000000, 1100000, 600000], 'PR': [190000000, 9000000, 6000000],
          'RJ': [160000000, 7500000, 5000000], 'RN': [32000000, 1500000, 900000], 'RO': [22000000, 1000000, 600000],
          'RR': [9000000, 450000, 250000], 'RS': [170000000, 8000000, 5500000], 'SC': [180000000, 8500000, 6000000],
          'SE': [20000000, 900000, 550000], 'SP': [600000000, 28000000, 18000000], 'TO': [18000000, 800000, 500000],
          'BRASIL': [2685500000, 125000000, 80000000]
        };

        const gratuidadeData = drsList.map(dr => {
          const [rlcc, mat, grat] = gratuidadeRawMatrix[dr];
          const totalHoras = mat + grat;
          const custo = totalHoras > 0 ? rlcc / totalHoras : 0;
          return {
            DR: dr,
            rlcc, mat, grat, totalHoras,
            Realizado: custo,
            Meta: 14.50 
          };
        });

        // =========================================================================
        // UTILS
        // =========================================================================
        const colors = { bg: '#FFFFFF', text: '#1F2937', cardBg: '#374151', cyan: '#06B6D4', success: '#10B981', warning: '#EF4444', metaLine: '#EA580C', brandPurple: '#8B5CF6' };

        const formatValue = (val, formatType) => {
          if (val === undefined || val === null || isNaN(val)) return '-';
          const numVal = Number(val);
          if (formatType === 'currency') return `R$ ${numVal.toFixed(2).replace('.', ',')}`;
          if (formatType === 'percent') return `${numVal.toFixed(1).replace('.', ',')}%`;
          return numVal;
        };

        const formatLargeNumber = (num) => {
          if (num >= 1000000) return (num / 1000000).toFixed(1).replace('.', ',') + 'M';
          if (num >= 1000) return (num / 1000).toFixed(1).replace('.', ',') + 'K';
          return num.toString();
        };

        function App() {
          const [view, setView] = useState('PEG'); 
          const [filterCategory, setFilterCategory] = useState('Todos');
          const [selectedIndicator, setSelectedIndicator] = useState(allIndicators[0]);
          const [selectedDR, setSelectedDR] = useState('GO'); // Novo Estado para o filtro de DR

          const indicatorStatusMap = useMemo(() => {
            const statusMap = {};
            allIndicators.forEach(ind => {
              const rule = indicatorRules[ind];
              const indData = rawData.filter(d => d.Indicador === ind && d.DR !== 'BRASIL');
              
              indData.sort((a, b) => {
                const valA = a.Realizado !== null ? a.Realizado : (rule.isHigherBetter ? -Infinity : Infinity);
                const valB = b.Realizado !== null ? b.Realizado : (rule.isHigherBetter ? -Infinity : Infinity);
                return rule.isHigherBetter ? valB - valA : valA - valB;
              });

              const currentDRData = indData.find(d => d.DR === selectedDR);
              const currentDRRank = indData.findIndex(d => d.DR === selectedDR) + 1;

              if (!currentDRData || currentDRData.Realizado === null) {
                statusMap[ind] = 'Sem Dados';
              } else {
                const achieved = rule.isHigherBetter ? currentDRData.Realizado >= currentDRData.Meta : currentDRData.Realizado <= currentDRData.Meta;
                const isTop5 = currentDRRank > 0 && currentDRRank <= 5;
                if (achieved || isTop5) {
                  statusMap[ind] = 'Destaques';
                } else {
                  statusMap[ind] = 'Atenção';
                }
              }
            });
            return statusMap;
          }, [selectedDR]);

          const filteredIndicatorsList = useMemo(() => {
            if (filterCategory === 'Todos') return allIndicators;
            return allIndicators.filter(ind => indicatorStatusMap[ind] === filterCategory);
          }, [filterCategory, indicatorStatusMap]);

          useEffect(() => {
            if (filteredIndicatorsList.length > 0 && !filteredIndicatorsList.includes(selectedIndicator)) {
              setSelectedIndicator(filteredIndicatorsList[0]);
            }
          }, [filteredIndicatorsList, selectedIndicator]);

          const processedPeg = useMemo(() => {
            let filtered = rawData.filter(d => d.Indicador === selectedIndicator && d.DR !== 'BRASIL');
            const brasilData = rawData.find(d => d.Indicador === selectedIndicator && d.DR === 'BRASIL');
            const rule = indicatorRules[selectedIndicator] || { isHigherBetter: true, format: 'percent' };

            filtered.sort((a, b) => {
              const valA = a.Realizado !== null ? a.Realizado : (rule.isHigherBetter ? -Infinity : Infinity);
              const valB = b.Realizado !== null ? b.Realizado : (rule.isHigherBetter ? -Infinity : Infinity);
              return rule.isHigherBetter ? valB - valA : valA - valB;
            });
            return { ranking: filtered, brasil: brasilData, rule };
          }, [selectedIndicator]);

          const processedGrat = useMemo(() => {
            let filtered = gratuidadeData.filter(d => d.DR !== 'BRASIL');
            const brasilData = gratuidadeData.find(d => d.DR === 'BRASIL');
            const rule = { isHigherBetter: false, format: 'currency' };
            
            filtered.sort((a, b) => a.Realizado - b.Realizado);
            return { ranking: filtered, brasil: brasilData, rule };
          }, []);

          const currentData = view === 'PEG' ? processedPeg : processedGrat;
          const { ranking, brasil, rule } = currentData;
          
          // Resgatando dados baseados no filtro de DR
          const activeDRData = ranking.find(d => d.DR === selectedDR);
          const activeDRRank = activeDRData && activeDRData.Realizado !== null ? ranking.findIndex(d => d.DR === selectedDR) + 1 : 0;
          
          const targetAchieved = activeDRData && activeDRData.Realizado !== null 
            ? (rule.isHigherBetter ? activeDRData.Realizado >= activeDRData.Meta : activeDRData.Realizado <= activeDRData.Meta)
            : false;

          const isTop5 = activeDRRank > 0 && activeDRRank <= 5;
          const isHighlight = targetAchieved || isTop5;

          const generateInsights = () => {
            if (!activeDRData || activeDRData.Realizado === null) return { points: [], attention: [] };
            let points = []; let attention = [];

            if (targetAchieved) {
              points.push(`A meta foi batida com eficiência: Resultado atual (${formatValue(activeDRData.Realizado, rule.format)}) supera a métrica base de ${formatValue(activeDRData.Meta, rule.format)}.`);
            } else if (isTop5) {
              points.push(`Destaque Competitivo: Apesar de não atingir a meta estipulada (${formatValue(activeDRData.Meta, rule.format)}), o DR ${selectedDR} figura na elite nacional ocupando a ${activeDRRank}ª posição.`);
            } else {
              attention.push(`Resultado de ${formatValue(activeDRData.Realizado, rule.format)} requer revisão estratégica para alcance da meta de ${formatValue(activeDRData.Meta, rule.format)}.`);
            }

            if (activeDRRank <= 5) {
              points.push(`Performance de Alto Nível: O estado consolida-se no Top 5 nacional em eficiência, sendo o ${activeDRRank}º entre todos os DRs.`);
            } else if (activeDRRank > 20) {
              attention.push(`Ocupando a ${activeDRRank}ª posição no ranking, há forte recomendação para adoção de benchmarking com estados líderes neste indicador.`);
            }
            return { points, attention };
          };

          const insights = generateInsights();

          const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
              const data = payload[0].payload;
              return (
                <div className="bg-gray-800 text-white p-4 rounded-lg shadow-xl border border-gray-700 z-50">
                  <p className="font-bold text-cyan-500 mb-2">{label === selectedDR ? `📍 DR ${label}` : `DR ${label}`}</p>
                  
                  {view === 'PEG' ? (
                    <>
                      <p className="text-sm">Realizado: <span className="font-bold">{formatValue(data.Realizado, rule.format)}</span></p>
                      <p className="text-sm text-gray-400">Meta: <span className="text-orange-400 font-semibold">{formatValue(data.Meta, rule.format)}</span></p>

                        {/* Card 2: Situação */}

                      </div>

                      {/* GRID DE GRÁFICOS (100% WIDTH PARA COMPARAÇÃO) */}
                      <div className="flex flex-col gap-8">
                        
                        {/* Gráfico 1: Custo Aluno Hora por DR */}
                        <div className="bg-gray-50 rounded-3xl p-6 border border-gray-200 shadow-inner">
                          <div className="flex justify-between items-center mb-6">

                            </h3>
                            <span className="text-sm font-bold text-gray-400 bg-gray-200 px-3 py-1 rounded-full">{activeDRRank}º Menor Custo do Brasil</span>

                          <div style={{ width: '100%', height: '350px' }}>

                                    <Cell key={`cell-${index}`} fill={entry.DR === selectedDR ? colors.brandPurple : colors.cardBg} />
                                  ))}
                                  <LabelList 
                                    dataKey="Realizado" position="top" 
                                    formatter={(val) => val === null || val === undefined ? '' : formatValue(val, rule.format).replace('R$ ', '')}
                                    style={{ fill: '#4B5563', fontSize: '10px', fontWeight: 'bold' }}

                          </div>
                        </div>

                                <YAxis tickFormatter={(val) => formatLargeNumber(val)} axisLine={false} tickLine={false} tick={{ fill: '#9CA3AF', fontSize: 11, fontWeight: 'bold' }} />

                                    {ranking.map((entry, index) => (
                                      <Cell key={`grat-${index}`} opacity={entry.DR === selectedDR ? 1 : 0.7} />
                                    ))}
                                    <LabelList dataKey="grat" position="inside" formatter={(val) => val > 0 ? formatLargeNumber(val) : ''} style={{ fill: '#ffffff', fontSize: '10px', fontWeight: 'bold', opacity: 0.9 }} />

              {/* RODAPÉ */}

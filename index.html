    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine, Cell, LabelList } = window.Recharts;
        
        // =========================================================================

        // =========================================================================
        const AlertCircle = ({ size = 24, color = "currentColor", className = "", style = {} }) => (

        );

        // =========================================================================
        // EXTRAÇÃO EXATA DA TABELA ORIGINAL DO RELATÓRIO DO SENAI
        // =========================================================================
        const drsList = ["AC", "AL", "AM", "AP", "BA", "CE", "DF", "ES", "GO", "MA", "MG", "MS", "MT", "PA", "PB", "PE", "PI", "PR", "RJ", "RN", "RO", "RR", "RS", "SC", "SE", "SP", "TO", "BRASIL"];
        
        const indNames = [
          'Custo hora-aluno FIC+TEC presencial',
          'Custo hora-aluno FIC+TEC semipresencial/EaD',
          '% de conclusão nos cursos FIC presencial',
          '% de conclusão nos cursos TEC presencial',
          '% de conclusão nos cursos FIC semipresencial e EaD',
          '% de conclusão nos cursos TEC semipresencial e EaD',
          'Percentual de recursos destinados às atividades-fim',
          'Impacto da folha de pessoal no orçamento',
          'Sustentabilidade operacional em Serviços de Tecnologia e Inovação',
          '% da Receita de STI sobre a receita de contribuição compulsória',
          'Aumento da produtividade nas empresas atendidas por programas de produtividade industrial'
        ];

        // Matriz de dados rigorosa extraída da imagem em anexo. 
        const dataMatrix = [
          [14.96, 19.17, 10.26, 14.04, 89.1, 90.0, 80.0, 17.9, 75.5, 84.8, 52.5, null, 85.9, 85.9, 48.1, 49.4, 71.0, 46.9, 7.2, 1.1, 20.0, 139.3], // AC
          [14.96, 19.92, 10.26, 13.82, 89.1, 90.7, 66.7, 0.0, 75.5, 99.5, 52.5, null, 85.9, 84.1, 61.0, 61.1, 62.0, 43.6, 6.8, 7.5, 20.0, 29.6], // AL
          [14.96, 18.25, 10.26, 12.78, 91.5, 87.6, 65.7, 62.1, 75.5, 88.8, 52.5, 95.3, 85.9, 81.4, 48.1, 46.7, 58.8, 74.1, 4.3, 2.8, 20.0, 40.5], // AM
          [14.96, 15.16, 10.26, 10.64, 89.1, 96.3, 65.7, 67.6, 85.4, 99.0, null, null, 85.9, 85.2, 48.1, 47.0, 71.0, 133.7, 6.8, 5.9, 20.0, 21.1], // AP
          [13.04, 13.29, 8.73, 8.10, 89.1, 67.9, 65.7, 33.9, 75.5, 54.5, 54.2, 30.8, 94.2, 95.1, 48.1, 51.4, 87.3, 82.5, 102.0, 90.6, 20.0, 37.7], // BA
          [11.21, 12.88, 9.02, 7.77, 89.3, 92.9, 65.7, 51.4, 75.5, 96.1, 66.7, 52.4, 85.9, 85.9, 48.1, 60.7, 71.0, 78.1, 16.6, 20.0, 20.0, 31.9], // CE
          [14.96, 18.03, 10.26, 11.70, 89.1, 70.2, 65.7, 41.9, 75.5, 71.2, 52.5, 27.7, 85.9, 93.1, 48.1, 56.5, 71.0, 31.2, 10.9, 2.6, 20.0, 43.2], // DF
          [14.96, 14.90, 10.26, 12.07, 89.1, 87.0, 69.8, 72.7, 75.5, 96.8, 52.5, 0.0, 85.9, 87.2, 48.1, 49.1, 71.0, 64.9, 8.7, 2.7, 20.0, 53.9], // ES
          [10.06, 10.04, 4.07, 5.10, 91.0, 84.3, 65.7, 42.1, 75.5, 64.8, 52.5, 31.3, 89.4, 93.1, 39.1, 50.3, 71.0, 78.5, 13.1, 7.9, 20.0, 38.4], // GO
          [10.47, 12.16, 7.17, 9.88, 93.0, 95.5, 65.7, 62.3, 75.5, 87.4, 52.5, 35.8, 85.9, 89.4, 48.1, 51.5, 71.0, 74.4, 1.0, 2.9, 20.0, 33.7], // MA
          [11.64, 12.48, 10.26, 5.73, 89.1, 91.4, 65.7, 49.2, 75.5, 91.9, 52.5, 35.4, 87.4, 93.1, 47.5, 46.0, 100.7, 77.9, 17.8, 9.2, 20.0, 34.5], // MG
          [14.96, 12.79, 10.26, 9.24, 89.1, 83.9, 65.7, 34.2, 75.5, 95.6, 52.5, 20.2, 86.8, 88.3, 48.1, 66.3, 71.0, 57.2, 37.6, 11.9, 20.0, 39.5], // MS
          [14.96, 15.80, 10.26, 11.60, 89.1, 93.9, 65.7, 49.3, 75.5, 54.0, 52.5, null, 85.9, 88.0, 48.1, 56.9, 71.0, 76.2, 11.5, 5.2, 20.0, 33.6], // MT
          [13.55, 11.22, 9.17, 10.43, 89.1, 89.6, 65.7, 78.1, 75.5, 93.3, 52.5, null, 85.9, 85.3, 48.1, 59.0, 71.0, 14.5, 16.1, 0.8, 20.0, 41.2], // PA
          [14.96, 14.85, 10.26, 9.28, 89.1, 87.8, 65.7, 41.7, 75.5, 93.5, 52.5, 25.8, 85.9, 86.2, 48.1, 49.6, 71.0, 60.9, 14.3, 6.4, 20.0, 59.9], // PB
          [11.74, 14.09, 9.08, 11.16, 89.1, 92.1, 65.7, 35.0, 75.5, 74.5, 52.5, 28.6, 85.9, 92.4, 48.1, 46.4, 72.0, 146.1, 34.1, 18.2, 20.0, 34.9], // PE
          [14.96, 25.08, 10.26, 24.95, 89.1, 80.7, 65.7, 0.0, 75.5, 66.7, null, null, 85.9, 70.8, 48.1, 42.6, 58.8, 2.8, 6.8, 0.2, 20.0, 37.0], // PI
          [14.96, 15.41, 10.26, 8.80, 89.1, 78.3, 70.2, 26.8, 75.5, 64.5, 52.5, 25.0, 85.9, 93.1, 48.1, 44.8, 80.0, 113.3, 34.2, 15.6, 20.0, 53.6], // PR
          [14.96, 11.37, 11.36, 8.12, 89.1, 73.9, 65.7, 63.4, 83.3, 66.6, 52.5, 66.7, 85.9, 86.8, 52.7, 53.4, 69.0, 73.6, 12.0, 9.0, 20.0, 57.3], // RJ
          [12.48, 15.91, 8.49, 16.14, 89.1, 91.3, 65.7, 36.9, 75.5, 94.8, 52.5, 0.0, 85.9, 91.9, 48.1, 49.3, 81.4, 92.0, 50.0, 27.6, 20.0, 42.1], // RN
          [11.21, 7.41, 7.47, 5.56, 89.1, 93.2, 65.7, 16.7, 75.5, 98.9, 52.5, 35.5, 85.9, 90.0, 38.9, 38.5, 71.0, 40.6, 1.0, 1.8, 20.0, 37.4], // RO
          [14.96, 16.31, 10.26, 12.59, 89.1, 89.4, 65.7, null, 77.4, 95.9, 52.5, null, 85.9, 80.7, 48.1, 51.1, 58.8, 29.5, 1.0, 0.7, 20.0, 26.2], // RR
          [14.96, 14.85, 10.26, 10.80, 89.1, 93.4, 65.7, 61.5, 85.6, 97.7, 52.5, 52.0, 85.9, 91.8, 48.1, 61.0, 71.0, 75.0, 24.5, 11.0, 20.0, 46.3], // RS
          [14.96, 13.56, 10.26, 9.91, 89.9, 77.3, 65.7, 46.3, 85.1, 62.1, 52.5, 33.3, 85.9, 90.6, 51.7, 57.7, 71.2, 82.7, 46.4, 26.9, 20.0, 34.1], // SC
          [14.96, 12.16, 8.45, 12.09, 89.1, 77.8, 65.7, 60.0, 87.5, 100.0, 52.5, 38.9, 85.9, 89.7, 48.1, 48.0, 58.8, 52.2, 1.0, 0.5, 20.0, 61.4], // SE
          [22.24, 21.58, 11.59, 9.22, 89.1, 91.6, 72.5, 78.9, 75.5, 79.4, 52.6, 75.0, 93.3, 96.2, 74.0, 63.0, 37.4, 76.7, 6.9, 4.6, 20.0, 41.3], // SP
          [14.96, 15.12, 10.26, 10.41, 89.1, 87.5, 65.7, 51.3, 75.5, 79.7, 52.5, 50.0, 85.9, 87.9, 48.1, 50.5, 71.0, 77.6, 1.0, 0.7, 20.0, 25.2], // TO
          [14.96, 15.45, 10.26, 8.55, 89.1, 87.6, 65.7, 50.1, 75.5, 78.3, 52.5, 37.6, 85.9, 92.0, 48.1, 55.2, 71.0, 79.9, 18.8, 11.4, 20.0, 39.2], // BRASIL
        ];

        const rawData = [];
        drsList.forEach((dr, i) => {
          indNames.forEach((ind, j) => {
            rawData.push({
              DR: dr,
              Indicador: ind,
              Meta: dataMatrix[i][j*2],
              Realizado: dataMatrix[i][j*2 + 1]
            });
          });
        });

        const indicatorRules = {
          'Custo hora-aluno FIC+TEC presencial': { isHigherBetter: false, format: 'currency' },
          'Custo hora-aluno FIC+TEC semipresencial/EaD': { isHigherBetter: false, format: 'currency' },
          '% de conclusão nos cursos FIC presencial': { isHigherBetter: true, format: 'percent' },
          '% de conclusão nos cursos TEC presencial': { isHigherBetter: true, format: 'percent' },
          '% de conclusão nos cursos FIC semipresencial e EaD': { isHigherBetter: true, format: 'percent' },
          '% de conclusão nos cursos TEC semipresencial e EaD': { isHigherBetter: true, format: 'percent' },
          'Percentual de recursos destinados às atividades-fim': { isHigherBetter: true, format: 'percent' },
          'Impacto da folha de pessoal no orçamento': { isHigherBetter: false, format: 'percent' },
          'Sustentabilidade operacional em Serviços de Tecnologia e Inovação': { isHigherBetter: true, format: 'percent' },
          '% da Receita de STI sobre a receita de contribuição compulsória': { isHigherBetter: true, format: 'percent' },
          'Aumento da produtividade nas empresas atendidas por programas de produtividade industrial': { isHigherBetter: true, format: 'percent' }
        };

        const allIndicators = Object.keys(indicatorRules);

        // Indicadores que o Relatório Oficial (PDF) apontou como fora da meta no cenário BRASIL
        const indicatorsBelowNationalTarget = [
          '% da Receita de STI sobre a receita de contribuição compulsória',
          '% de conclusão nos cursos TEC presencial',
          '% de conclusão nos cursos TEC semipresencial e EaD'
        ];

        const colors = {
          bg: '#FFFFFF', text: '#1F2937', cardBg: '#374151', cyan: '#06B6D4', success: '#10B981', warning: '#EF4444', metaLine: '#EA580C'
        };

        const formatValue = (val, formatType) => {
          if (val === undefined || val === null || isNaN(val)) return '-';
          const numVal = Number(val);
          if (formatType === 'currency') return `R$ ${numVal.toFixed(2).replace('.', ',')}`;
          if (formatType === 'percent') return `${numVal.toFixed(1).replace('.', ',')}%`;
          return numVal;
        };

        function App() {
          const [filterCategory, setFilterCategory] = useState('Todos');
          const [selectedIndicator, setSelectedIndicator] = useState(allIndicators[0]);

          const indicatorStatusMap = useMemo(() => {
            const statusMap = {};
            allIndicators.forEach(ind => {
              const rule = indicatorRules[ind];
              const goData = rawData.find(d => d.Indicador === ind && d.DR === 'GO');
              if (!goData || goData.Realizado === null) {
                statusMap[ind] = 'Sem Dados';
              } else {
                const achieved = rule.isHigherBetter ? goData.Realizado >= goData.Meta : goData.Realizado <= goData.Meta;
                statusMap[ind] = achieved ? 'Destaques' : 'Atenção';
              }
            });
            return statusMap;
          }, []);

          const filteredIndicatorsList = useMemo(() => {
            if (filterCategory === 'Todos') return allIndicators;
            return allIndicators.filter(ind => indicatorStatusMap[ind] === filterCategory);
          }, [filterCategory, indicatorStatusMap]);

          useEffect(() => {
            if (filteredIndicatorsList.length > 0 && !filteredIndicatorsList.includes(selectedIndicator)) {
              setSelectedIndicator(filteredIndicatorsList[0]);
            }
          }, [filteredIndicatorsList, selectedIndicator]);

          const processedData = useMemo(() => {
            let filtered = rawData.filter(d => d.Indicador === selectedIndicator && d.DR !== 'BRASIL');
            const brasilData = rawData.find(d => d.Indicador === selectedIndicator && d.DR === 'BRASIL');
            const rule = indicatorRules[selectedIndicator] || { isHigherBetter: true, format: 'percent' };

            // Ordenação correta lidando com nulls
            filtered.sort((a, b) => {
              const valA = a.Realizado !== null ? a.Realizado : (rule.isHigherBetter ? -Infinity : Infinity);
              const valB = b.Realizado !== null ? b.Realizado : (rule.isHigherBetter ? -Infinity : Infinity);
              return rule.isHigherBetter ? valB - valA : valA - valB;
            });
            return { ranking: filtered, brasil: brasilData, rule };
          }, [selectedIndicator]);

          const { ranking, brasil, rule } = processedData;
          const goiasData = ranking.find(d => d.DR === 'GO');
          
          const targetAchieved = goiasData && goiasData.Realizado !== null 
            ? (rule.isHigherBetter ? goiasData.Realizado >= goiasData.Meta : goiasData.Realizado <= goiasData.Meta)
            : false;

          const goiasRank = goiasData && goiasData.Realizado !== null ? ranking.findIndex(d => d.DR === 'GO') + 1 : 0;

          const generateInsights = () => {
            if (!goiasData || goiasData.Realizado === null) return { points: [], attention: ['Sem dados disponíveis para o Estado de Goiás neste indicador.'] };

            const diffToMeta = Math.abs(goiasData.Realizado - goiasData.Meta);
            const pctDiffToMeta = goiasData.Meta !== 0 ? (diffToMeta / goiasData.Meta) * 100 : 0;
            
            let points = [];
            let attention = [];

            // Contexto com base no relatório oficial do SENAI
            const isNationalChallenge = indicatorsBelowNationalTarget.includes(selectedIndicator);

            if (targetAchieved) {
              points.push(`O resultado registrado (${formatValue(goiasData.Realizado, rule.format)}) cumpriu com sucesso a meta estipulada (${formatValue(goiasData.Meta, rule.format)}).`);
              
              if (isNationalChallenge) {
                points.push(`Resiliência Comprovada: Embora este indicador tenha ficado abaixo da margem no consolidado do Brasil, o DR-GO superou o desafio sistêmico e atingiu a meta estabelecida.`);
              } else {
                 points.push(`O estado acompanha o bom desempenho da rede, já que este indicador também alcançou as metas sistêmicas no panorama Brasil.`);
              }

              if (pctDiffToMeta > 10) {
                points.push(rule.isHigherBetter 
                  ? `Desempenho de excelência, superando a meta em mais de ${pctDiffToMeta.toFixed(0)}%.`
                  : `Otimização de alta eficiência, operando com margem de ${pctDiffToMeta.toFixed(0)}% de folga em relação ao teto da meta.`);
              }
            } else {
              attention.push(`O resultado atual de ${formatValue(goiasData.Realizado, rule.format)} está fora da meta ideal/esperada de ${formatValue(goiasData.Meta, rule.format)}.`);
              
              if (isNationalChallenge) {
                attention.push(`Desafio Sistêmico: Este indicador figurou fora da meta também no consolidado nacional (Brasil), revelando uma dificuldade estrutural da rede que afeta diretamente as operações em Goiás.`);
              } else {
                attention.push(`Recomenda-se revisão estratégica focada em ${rule.isHigherBetter ? 'alavancar os processos de atração, retenção e produtividade' : 'contenção de custos e eficiência operacional'} para alinhar os resultados às metas.`);
              }
            }

            const validRanks = ranking.filter(d => d.Realizado !== null).length;
            const topTertile = Math.ceil(validRanks / 3);
            if (goiasRank <= topTertile && goiasRank > 0) {
              points.push(`O DR Goiás ganha destaque, ocupando a ${goiasRank}ª posição em eficiência dentre os ${validRanks} estados analisados.`);
            } else if (goiasRank > validRanks - topTertile) {
              attention.push(`No ranking nacional, o estado encontra-se no terço inferior (${goiasRank}º lugar), sinalizando oportunidades de benchmarking com outros DRs.`);
            } else if (goiasRank > 0) {
              points.push(`O estado mantém uma posição intermediária saudável (${goiasRank}º lugar) no cenário nacional.`);
            }

            if (brasil && brasil.Realizado !== null) {
              const betterThanBr = rule.isHigherBetter ? goiasData.Realizado > brasil.Realizado : goiasData.Realizado < brasil.Realizado;
              if (betterThanBr) {
                points.push(`A performance estadual goiana é mais eficiente do que a média consolidada do sistema SENAI Brasil (${formatValue(brasil.Realizado, rule.format)}).`);
              } else {
                attention.push(`A performance pontual deste indicador demonstrou-se menos eficiente do que a média aferida em nível Brasil (${formatValue(brasil.Realizado, rule.format)}).`);
              }
            }

            return { points, attention };
          };

          const insights = generateInsights();

          const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
              const data = payload[0].payload;
              return (
                <div className="bg-gray-800 text-white p-4 rounded-lg shadow-xl border border-gray-700">
                  <p className="font-bold text-cyan-500 mb-2">{label === 'GO' ? '📍 DR GOIÁS' : `DR ${label}`}</p>
                  <p className="text-sm">Realizado: <span className="font-bold">{formatValue(data.Realizado, rule.format)}</span></p>
                  <p className="text-sm text-gray-400">Meta: <span className="text-orange-400 font-semibold">{formatValue(data.Meta, rule.format)}</span></p>
                </div>
              );
            }
            return null;
          };

          return (
            <div className="min-h-screen bg-white text-gray-800 p-4 md:p-8 w-full font-sans">
              {/* CABEÇALHO E FILTROS */}
              <header className="mb-8 flex flex-col xl:flex-row justify-between items-start xl:items-center border-b-2 border-gray-200 pb-6 gap-6">
                <div>
                  <h1 className="text-3xl md:text-4xl font-black tracking-tight text-gray-800">
                    Painel Estratégico <span className="text-cyan-500">PEG</span>
                  </h1>
                  <p className="text-gray-500 font-medium mt-1 uppercase tracking-widest text-sm">
                    Monitorização DR Goiás • Jan a Mai 2026
                  </p>
                </div>
                
                <div className="flex flex-col gap-4 w-full xl:w-auto">
                  <div className="flex flex-wrap gap-2 items-center">
                    <span className="text-xs font-bold text-gray-500 uppercase flex items-center gap-1 mr-2">
                      <Filter size={14} /> Filtro de Desempenho (GO):
                    </span>
                    {['Todos', 'Destaques', 'Atenção'].map(cat => (
                      <button
                        key={cat}
                        onClick={() => setFilterCategory(cat)}
                        className={`px-4 py-2 rounded-full text-xs font-bold uppercase transition-all ${
                          filterCategory === cat 
                            ? cat === 'Destaques' ? 'bg-emerald-500 text-white shadow-lg' 
                              : cat === 'Atenção' ? 'bg-red-500 text-white shadow-lg' 
                              : 'bg-cyan-500 text-white shadow-lg'
                            : 'bg-gray-200 text-gray-600 hover:bg-gray-300'
                        }`}
                      >
                        {cat}
                      </button>
                    ))}
                  </div>

                  {filteredIndicatorsList.length > 0 ? (
                    <select 
                      className="w-full xl:w-[28rem] rounded-lg p-3 outline-none font-medium cursor-pointer shadow-lg transition-all text-sm bg-gray-800 text-white border-none"
                      value={selectedIndicator}
                      onChange={(e) => setSelectedIndicator(e.target.value)}
                    >
                      {filteredIndicatorsList.map(ind => (
                        <option key={ind} value={ind}>{ind}</option>
                      ))}
                    </select>
                  ) : (
                    <div className="w-full xl:w-96 bg-gray-100 text-gray-400 rounded-lg p-3 text-sm font-medium border border-gray-200">
                      Nenhum indicador encontrado para este filtro.
                    </div>
                  )}
                </div>
              </header>

              {goiasData ? (
                <>
                  {/* CARTÕES KPI */}
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div className="p-6 rounded-2xl shadow-lg relative overflow-hidden group bg-gray-800 border-l-4 border-cyan-500">
                      <div className="absolute top-0 right-0 p-4 opacity-20"><Target size={48} color="#06B6D4"/></div>
                      <p className="text-sm font-bold uppercase tracking-wider mb-1 text-gray-400">Resultado GO</p>
                      <h2 className="text-3xl font-black text-white">{formatValue(goiasData.Realizado, rule.format)}</h2>
                      <p className="text-sm mt-2 font-medium text-orange-400">Meta: {formatValue(goiasData.Meta, rule.format)}</p>
                    </div>

                    <div className={`p-6 rounded-2xl shadow-lg relative overflow-hidden bg-gray-800 border-l-4 ${goiasData.Realizado === null ? 'border-gray-500' : targetAchieved ? 'border-emerald-500' : 'border-red-500'}`}>
                      <div className="absolute top-0 right-0 p-4 opacity-20"><Award size={48} color={goiasData.Realizado === null ? '#9CA3AF' : targetAchieved ? '#10B981' : '#EF4444'}/></div>
                      <p className="text-sm font-bold uppercase tracking-wider mb-1 text-gray-400">Estado da Meta</p>
                      <div className="flex items-center gap-2 mt-1">
                        {goiasData.Realizado === null ? <Info color="#9CA3AF" size={28}/> : targetAchieved ? <CheckCircle color="#10B981" size={28}/> : <AlertCircle color="#EF4444" size={28}/>}
                        <h2 className={`text-2xl font-black ${goiasData.Realizado === null ? 'text-gray-400' : targetAchieved ? 'text-emerald-400' : 'text-red-400'}`}>
                          {goiasData.Realizado === null ? 'Sem Dados' : targetAchieved ? 'Destaque Alcançado' : 'Ponto de Atenção'}
                        </h2>
                      </div>
                      <p className="text-xs mt-2 text-gray-400">{rule.isHigherBetter ? 'Maior é melhor' : 'Menor é melhor'}</p>
                    </div>

                    <div className="p-6 rounded-2xl shadow-lg relative overflow-hidden bg-gray-800 border-l-4 border-gray-600">
                       <div className="absolute top-0 right-0 p-4 opacity-20"><TrendingUp size={48} color="#9CA3AF"/></div>
                      <p className="text-sm font-bold uppercase tracking-wider mb-1 text-gray-400">Ranking Nacional</p>
                      <div className="flex items-baseline gap-1">
                        <h2 className="text-3xl font-black text-white">{goiasRank > 0 ? `${goiasRank}º` : '-'}</h2>
                        <span className="font-medium text-gray-400">/ {ranking.filter(r => r.Realizado !== null).length}</span>
                      </div>
                    </div>

                    <div className="p-6 rounded-2xl shadow-lg relative overflow-hidden bg-gray-800 border-l-4 border-gray-600">
                       <div className="absolute top-0 right-0 p-4 opacity-20"><Info size={48} color="#9CA3AF"/></div>
                      <p className="text-sm font-bold uppercase tracking-wider mb-1 text-gray-400">Média Brasil</p>
                      <h2 className="text-3xl font-black text-white">{brasil ? formatValue(brasil.Realizado, rule.format) : '-'}</h2>
                    </div>
                  </div>

                  {/* GRELHA DE CONTEÚDO PRINCIPAL */}
                  <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                    
                    {/* SECÇÃO DO GRÁFICO */}
                    <div className="bg-gray-50 rounded-3xl p-6 border border-gray-200 shadow-inner xl:col-span-2">
                      <h3 className="text-xl font-bold mb-6 flex items-center gap-2 text-gray-800">
                        <span className="text-cyan-500"><TrendingUp size={24} /></span> 
                        Ranking de Desempenho por Estado
                      </h3>
                      
                      <div style={{ width: '100%', height: '440px' }}>
                        <ResponsiveContainer width="100%" height="100%">
                          {/* Aumentei a margem direita (right) para 90 para garantir que o rótulo caiba inteiro fora da grade de barras */}
                          <BarChart data={ranking} margin={{ top: 40, right: 90, left: 0, bottom: 5 }}>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E5E7EB" />
                            <XAxis 
                              dataKey="DR" 
                              axisLine={false} 
                              tickLine={false} 
                              tick={{ fill: '#4B5563', fontWeight: 'bold', fontSize: 11 }} 
                            />
                            {/* Um domínio maior para o Y evitar sobreposições verticais */}
                            <YAxis hide domain={[0, 'dataMax + (dataMax * 0.15)']} />
                            <Tooltip content={<CustomTooltip />} cursor={{ fill: '#F3F4F6' }} />
                            
                            <Bar dataKey="Realizado" radius={[4, 4, 0, 0]} maxBarSize={45}>
                              {ranking.map((entry, index) => (
                                <Cell 
                                  key={`cell-${index}`} 
                                  fill={entry.Realizado === null ? 'transparent' : entry.DR === 'GO' ? (targetAchieved ? colors.success : colors.warning) : colors.cardBg} 
                                />
                              ))}
                              <LabelList 
                                dataKey="Realizado" 
                                position="top" 
                                formatter={(val) => {
                                  if (val === null || val === undefined) return '';
                                  return formatValue(val, rule.format).replace('R$ ', '').replace('%', '');
                                }}
                                style={{ fill: '#4B5563', fontSize: '10px', fontWeight: 'bold' }}
                              />
                            </Bar>

                            {/* ReferenceLine movido DEPOIS das barras para ficar por cima (trazer pra frente). 
                                Posição 'right' coloca o texto confortavelmente fora do gráfico graças ao margin-right maior. */}
                            <ReferenceLine 
                              y={goiasData.Meta} 
                              stroke={colors.metaLine} 
                              strokeWidth={2}
                              strokeDasharray="4 4" 
                              label={{ 
                                position: 'right', 
                                value: `Meta: ${formatValue(goiasData.Meta, rule.format)}`, 
                                fill: colors.metaLine, 
                                fontSize: 12, 
                                fontWeight: '900' 
                              }} 
                            />
                          </BarChart>
                        </ResponsiveContainer>
                      </div>
                    </div>

                    {/* SECÇÃO DE INSIGHTS */}
                    <div className="flex flex-col gap-4">
                      <div className="rounded-3xl p-6 shadow-xl flex-1 flex flex-col bg-gray-800">
                        <h3 className="text-xl font-bold mb-6 flex items-center gap-2 pb-4 text-white border-b border-gray-700">
                          <span className="text-cyan-500"><TrendingUp size={24} /></span>
                          Análise Estratégica
                        </h3>
                        
                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                          {insights.points.length > 0 && (
                            <div className="mb-6">
                              <h4 className="font-bold uppercase text-xs tracking-widest mb-3 flex items-center gap-2 text-emerald-400">
                                <CheckCircle size={16} /> Fatos Positivos e Oportunidades
                              </h4>
                              <ul className="flex flex-col gap-3">
                                {insights.points.map((point, i) => (
                                  <li key={i} className="text-sm leading-relaxed p-3 rounded-lg text-gray-300 bg-gray-700/50 border-l-4 border-emerald-500">
                                    {point}
                                  </li>
                                ))}
                              </ul>
                            </div>
                          )}

                          {insights.attention.length > 0 && (
                            <div>
                              <h4 className="font-bold uppercase text-xs tracking-widest mb-3 flex items-center gap-2 text-red-400">
                                <AlertCircle size={16} /> Atenção e Desafios
                              </h4>
                              <ul className="flex flex-col gap-3">
                                {insights.attention.map((att, i) => (
                                  <li key={i} className="text-sm leading-relaxed p-3 rounded-lg text-gray-300 bg-red-900/20 border-l-4 border-red-500">
                                    {att}
                                  </li>
                                ))}
                              </ul>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>

                  </div>
                </>
              ) : (
                <div className="flex items-center justify-center h-64 rounded-2xl mt-8 bg-gray-50 border-2 border-dashed border-gray-300">
                  <p className="font-medium text-gray-500">Selecione um filtro ou indicador válido acima.</p>
                </div>
              )}

              {/* RODAPÉ */}
              <footer className="mt-12 text-center text-xs font-medium pb-4 pt-6 text-gray-400 border-t border-gray-100">
                Relatório Gerencial Analítico • Diretoria Regional de Goiás (DR-GO) • Monitoramento PEG (Jan a Mai 2026)
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
